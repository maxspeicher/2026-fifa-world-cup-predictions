<style>
  :root {

    --card-bg: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #c2185b;
    --accent2: #00695c;
    --border: #e0dcd4;
    --group-bg: #faf7f2;
    --high-xg: #c2185b;
    --low-xg: #78909c;
    --bar-home: #c2185b;
    --bar-away: #00695c;
    --tag-bg: #f0ebe3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 70%, rgba(194,24,91,0.12) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(0,105,92,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 8px;
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .hero h1 span { color: var(--accent); }

  .hero-sub {
    font-size: 14px;
    opacity: 0.55;
    max-width: 500px;
    margin: 8px auto 0;
  }

  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    font-size: 12px;
    opacity: 0.5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Filter bar */
  .filter-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,240,232,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* Main container */
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Match day header */
  .matchday-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--text);
  }

  .matchday-header:first-child { margin-top: 8px; }

  .matchday-date {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .matchday-count {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Match card */
  .match-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 16px 20px;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }

  .match-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .match-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .match-group {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .match-venue {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .match-body {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .team.away {
    flex-direction: row-reverse;
    text-align: right;
  }

  .team-flag {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--tag-bg);
    flex-shrink: 0;
  }

  .team-info {}
  .team-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .team-code {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .xg-center {
    text-align: center;
    min-width: 90px;
  }

  .xg-values {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
  }

  .xg-val {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
  }

  .xg-val.home { color: var(--bar-home); }
  .xg-val.away { color: var(--bar-away); }

  .xg-separator {
    font-size: 16px;
    color: var(--muted);
    font-weight: 300;
  }

  .xg-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* xG bar visualization */
  .xg-bar-wrap {
    margin-top: 12px;
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    background: var(--tag-bg);
  }

  .xg-bar-home {
    background: var(--bar-home);
    transition: width 0.6s ease;
  }

  .xg-bar-away {
    background: var(--bar-away);
    transition: width 0.6s ease;
    margin-left: auto;
  }

  .match-time {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
  }

  .match-time-tag {
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  .total-xg-tag {
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .total-xg-tag.high { color: var(--high-xg); }

  /* Legend */
  .legend {
    margin-top: 40px;
    padding: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 10px;
  }

  .legend-items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    line-height: 1.6;
  }

  .methodology {
    margin-top: 48px;
    border-top: 2px solid var(--text);
    padding-top: 32px;
  }

  .methodology-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 20px;

    font-weight: 600;

    text-transform: uppercase;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 3px 8px;
    border-radius: 4px;

  .method-toggle {
    font-size: 14px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .method-card.open .method-toggle { transform: rotate(180deg); }

  .method-card-body {
    display: none;
    padding: 0 20px 20px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  .method-card-body p { margin-bottom: 10px; }

  .method-card-body a {

    border-bottom: 1px solid rgba(0,105,92,0.3);

  .method-card-body a:hover { border-bottom-color: var(--accent2); }

  .method-card-body ul {

    padding: 0;

  .method-card-body li { margin-bottom: 4px; }

  .method-card-body .source-url {
    display: inline-block;
    font-size: 11px;
    color: var(--accent2);
    background: #e0f2f1;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 4px;
    word-break: break-all;
  }

  .formula-block {
    background: var(--group-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin: 12px 0;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
    overflow-x: auto;
  }

  .weight-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
  }

  .weight-table th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .weight-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .weight-table tr:last-child td { border-bottom: none; }

  .weight-table .weight-val {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .no-results-icon { font-size: 32px; margin-bottom: 12px; }
  .no-results-text { font-size: 14px; }

  @media (max-width: 600px) {
    .match-body { gap: 8px; }
    .team-name { font-size: 13px; }
    .xg-val { font-size: 22px; }
    .xg-center { min-width: 70px; }
    .match-venue { display: none; }
    .team-flag { width: 30px; height: 30px; font-size: 18px; }
  }
</style>
</head>

const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return `${dayNames[d.getDay()]}, ${monthNames[d.getMonth()]} ${d.getDate()}`;
}

function renderMatches(filter) {
  const container = document.getElementById('matchContainer');
  let filtered = matches;

  if (filter === 'high') {
    filtered = matches.filter(m => (m.homeXG + m.awayXG) >= 2.5);
  } else if (filter !== 'all') {
    filtered = matches.filter(m => m.group === filter);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">⚽</div><div class="no-results-text">No matches found for this filter</div></div>';
    return;
  }

  // Group by date
  const byDate = {};
  filtered.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  let html = '';
  for (const [date, dayMatches] of Object.entries(byDate)) {
    html += `<div class="matchday-header">
      <div class="matchday-date">${formatDate(date)}</div>
      <div class="matchday-count">${dayMatches.length} match${dayMatches.length > 1 ? 'es' : ''}</div>
    </div>`;

    dayMatches.forEach(m => {
      const total = m.homeXG + m.awayXG;
      const homePercent = (m.homeXG / total * 100).toFixed(0);
      const awayPercent = (m.awayXG / total * 100).toFixed(0);
      const isHigh = total >= 2.5;

      html += `<div class="match-card" data-group="${m.group}">
        <div class="match-top">
          <span class="match-group">Group ${m.group}</span>
          <span class="match-venue">${m.venue}</span>
        </div>
        <div class="match-body">
          <div class="team home">
            <div class="team-flag">${m.homeFlag}</div>
            <div class="team-info">
              <div class="team-name">${m.home}</div>
            </div>
          </div>
          <div class="xg-center">
            <div class="xg-values">
              <span class="xg-val home">${m.homeXG.toFixed(2)}</span>
              <span class="xg-separator">—</span>
              <span class="xg-val away">${m.awayXG.toFixed(2)}</span>
            </div>
            <div class="xg-label">predicted xG</div>
          </div>
          <div class="team away">
            <div class="team-flag">${m.awayFlag}</div>
            <div class="team-info">
              <div class="team-name">${m.away}</div>
            </div>
          </div>
        </div>
        <div class="xg-bar-wrap">
          <div class="xg-bar-home" style="width:${homePercent}%"></div>
          <div class="xg-bar-away" style="width:${awayPercent}%"></div>
        </div>
        <div class="match-time">
          <span class="match-time-tag">${m.time}</span>
          <span class="total-xg-tag ${isHigh ? 'high' : ''}">Total xG: ${total.toFixed(2)}${isHigh ? ' ↑' : ''}</span>
        </div>
      </div>`;
    });
  }

  // Legend + methodology + disclaimer
  html += `<div class="legend">
    <div class="legend-title">How to read this</div>
    <div class="legend-items">
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-home)"></div> Home team xG</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--bar-away)"></div> Away team xG</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--high-xg)"></div> High-scoring match (2.5+ total xG)</div>
    </div>
  </div>

  <div class="methodology">
    <div class="methodology-title">Methodology & Sources</div>
    <p class="methodology-intro">
      These predicted xG values are not live model outputs — they're pre-tournament estimates that combine multiple public data sources into a single per-match expected goals figure for each team. Here's exactly what went into them and how they were weighted.
    </p>

    <div class="method-card" id="mc1">
      <div class="method-card-header" onclick="toggleMethod('mc1')">
        <div class="method-icon src1">📊</div>
        <div class="method-card-title">World Cup Qualifying xG (xGscore.io)</div>
        <div class="method-card-tag">Weight: 35%</div>
        <div class="method-toggle">▼</div>
      </div>
      <div class="method-card-body">
        <p>Each team's xG created and xG conceded per match during their qualifying campaign was sourced from <a href="https://xgscore.io/xg-statistics/wc-qualifiers-europe/2026">xGscore.io</a>, which tracks expected goals for all major competitions using a shot-based model that accounts for shot location, angle, body part, assist type, and game state.</p>
        <p>This was the heaviest-weighted input because qualifying xG measures what teams actually produced in competitive matches over 6–12 games — large enough samples to be statistically meaningful. Key data points included:</p>
        <ul>
          <li><strong>xG per match</strong> — average expected goals created per game across all qualifying fixtures</li>
          <li><strong>xGA per match</strong> — average expected goals conceded, used to estimate opponent attacking output</li>
          <li><strong>xG fairness</strong> — how closely actual results tracked underlying chance quality, flagging teams that over- or under-performed their numbers</li>
        </ul>
        <p>For non-European qualifiers (CONMEBOL, CAF, AFC, etc.), equivalent xG data from their respective qualifying campaigns was used where available, with adjustments for confederation strength.</p>
        <div class="source-url">xgscore.io/xg-statistics/wc-qualifiers-europe/2026</div>
      </div>
    </div>

    <div class="method-card" id="mc2">
      <div class="method-card-header" onclick="toggleMethod('mc2')">
        <div class="method-icon src2">⚽</div>
        <div class="method-card-title">Match Score Predictions (ESPN, Big D Soccer, Bleacher Report)</div>
        <div class="method-card-tag">Weight: 25%</div>
        <div class="method-toggle">▼</div>
      </div>
      <div class="method-card-body">
        <p>Predicted scorelines for every group stage match were collected from multiple editorial sources that published full match-by-match predictions ahead of the tournament:</p>
        <ul>
          <li><strong>ESPN</strong> — "Predicting every game of the entire World Cup" by Ryan O'Hanlon, featuring match-by-match winners and projected scores based on staff consensus and historical patterns</li>
          <li><strong>Big D Soccer</strong> — "Every 2026 World Cup Group Stage Game, Predicted" by Drew Epperley, with specific score predictions and reasoning for all 72 group matches</li>
          <li><strong>Bleacher Report</strong> — Group projection rankings with implied goal expectations from Joe Tansey</li>
        </ul>
        <p>Predicted scorelines were converted into implied xG by averaging across sources where multiple predictions existed. For example, if ESPN predicted Brazil 2–1 Morocco and Big D Soccer predicted the same, the implied attacking xG for Brazil in that match was anchored around 1.8–2.0 (slightly below the predicted goals, since xG typically runs below actual goals due to finishing variance).</p>
        <div class="source-url">espn.com — "Picking every single game of the 2026 World Cup"</div>
        <div class="source-url">bigdsoccer.com/2026-world-cup-group-stage-predictions</div>
      </div>
    </div>

    <div class="method-card" id="mc3">
      <div class="method-card-header" onclick="toggleMethod('mc3')">
        <div class="method-icon src3">🏆</div>
        <div class="method-card-title">Pre-Tournament Market Odds (FanDuel, Polymarket)</div>
        <div class="method-card-tag">Weight: 20%</div>
        <div class="method-toggle">▼</div>
      </div>
      <div class="method-card-body">
        <p>Betting market odds encode the collective judgment of thousands of bettors and oddsmakers about team strength. Pre-tournament outright winner odds and group winner odds were sourced from FanDuel Sportsbook and Polymarket.</p>
        <p>These odds were converted into implied probabilities and then mapped to expected team strength tiers:</p>
        <table class="weight-table">
          <tr><th>Tier</th><th>Teams</th><th>Base xG/match</th></tr>
          <tr><td>Elite favorites</td><td>Spain, France, Brazil, Argentina, England</td><td class="weight-val">2.0–2.5</td></tr>
          <tr><td>Strong contenders</td><td>Germany, Netherlands, Portugal, Colombia, Croatia</td><td class="weight-val">1.6–2.0</td></tr>
          <tr><td>Competitive sides</td><td>USA, Mexico, Belgium, Uruguay, Japan, Norway, Austria, Türkiye, Senegal</td><td class="weight-val">1.3–1.7</td></tr>
          <tr><td>Mid-tier</td><td>South Korea, Czechia, Ecuador, Ivory Coast, Scotland, Switzerland, Morocco, Sweden, Egypt, Algeria, Iran, Bosnia & Herzegovina, Australia, Paraguay, Iraq, Ghana</td><td class="weight-val">0.9–1.3</td></tr>
          <tr><td>Lower mid-tier</td><td>Canada, Saudi Arabia, Qatar, Tunisia, DR Congo, Uzbekistan, Panama, South Africa, New Zealand</td><td class="weight-val">0.6–0.9</td></tr>
          <tr><td>Tournament debutants / lowest-ranked</td><td>Haiti, Curaçao, Cape Verde, Jordan</td><td class="weight-val">0.3–0.6</td></tr>
        </table>
        <p style="font-size:11px; margin-top:4px;">All 48 teams are represented above. Tier placement was determined by implied win probabilities from outright and group winner odds, cross-referenced with FIFA rankings as of June 2026.</p>
        <p>These tiers provided baseline ranges that were then adjusted by the other inputs. Market odds are particularly useful for calibrating match-ups between teams from different confederations who haven't played each other recently.</p>
      </div>
    </div>

    <div class="method-card" id="mc4">
      <div class="method-card-header" onclick="toggleMethod('mc4')">
        <div class="method-icon src4">📐</div>
        <div class="method-card-title">Historical Tournament Adjustments</div>
        <div class="method-card-tag">Weight: 10%</div>
        <div class="method-toggle">▼</div>
      </div>
      <div class="method-card-body">
        <p>World Cup group stages have well-documented statistical patterns that differ from qualifying or league play. Historical adjustments were applied based on data from the 2014, 2018, and 2022 tournaments:</p>
        <ul>
          <li><strong>Tournament compression</strong> — Group stage matches at World Cups average ~2.5 total goals per game. Teams tend to be more cautious in openers and more aggressive in must-win final group games. Matchday 1 xG was discounted ~5%, Matchday 3 boosted ~5%.</li>
          <li><strong>Host advantage</strong> — Host nations historically outperform their base level in group stages. Mexico (playing in Mexico City and Zapopan) received a +0.15 xG boost; USA and Canada received +0.10 for matches on their soil.</li>
          <li><strong>Mismatch inflation</strong> — The expanded 48-team format introduces more lopsided matchups than previous World Cups. For matches with large quality gaps (elite vs. lower-ranked), the stronger team's xG was pushed higher than a simple average would suggest, reflecting how dominant sides tend to create more against weak opposition.</li>
        </ul>
      </div>
    </div>

    <div class="method-card" id="mc5">
      <div class="method-card-header" onclick="toggleMethod('mc5')">
        <div class="method-icon src5">🔬</div>
        <div class="method-card-title">Opponent-Adjusted xGA (Defensive Calibration)</div>
        <div class="method-card-tag">Weight: 10%</div>
        <div class="method-toggle">▼</div>
      </div>
      <div class="method-card-body">
        <p>A team's predicted xG in a given match isn't just about their own attacking strength — it also depends on the opponent's defensive quality. The final xG values were adjusted by each opponent's xG conceded (xGA) record:</p>
        <div class="formula-block">
          Match xG (Team A) =<br>
          &nbsp;&nbsp;( TeamA_attacking_base × 0.6 ) +<br>
          &nbsp;&nbsp;( TeamB_defensive_weakness × 0.4 )<br><br>
          Where:<br>
          &nbsp;&nbsp;TeamA_attacking_base = weighted blend of QF xG,<br>
          &nbsp;&nbsp;&nbsp;&nbsp;editorial predictions, and market-implied strength<br>
          &nbsp;&nbsp;TeamB_defensive_weakness = TeamB's xGA/match<br>
          &nbsp;&nbsp;&nbsp;&nbsp;normalized to tournament average (1.25 xGA/match)
        </div>
        <p>This means a strong attack facing a weak defense gets inflated (e.g., Germany vs. Curaçao → 3.20 xG for Germany), while a strong attack facing an elite defense gets compressed (e.g., Brazil vs. Morocco → 1.95 xG for Brazil instead of a raw ~2.2).</p>
      </div>
    </div>
  </div>

  <div class="disclaimer">
    These are pre-tournament estimates, not live predictions. Actual xG will depend on lineups, tactics, game state, and in-match events.<br>
    Data sourced from xGscore.io, ESPN, Big D Soccer, Bleacher Report, FanDuel, and Polymarket. Not a betting recommendation.
  </div>`;

  container.innerHTML = html;
}

// Toggle methodology cards
function toggleMethod(id) {
  document.getElementById(id).classList.toggle('open');
}

// Filter buttons
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMatches(btn.dataset.filter);
});

// Initial render
renderMatches('all');
